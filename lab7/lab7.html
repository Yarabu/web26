<div class="mb-10 pb-6 border-b border-gray-300">
    <h3 class="text-xl font-bold mb-4">Завдання 3</h3>
    <input type="text" id="countyInput" placeholder="Baldwin County, Alabama" class="border border-gray-300 p-2 rounded w-64">
    <button id="findButton" class="bg-blue-100 hover:bg-blue-200 border border-blue-200 p-2 rounded transition">Знайти код округу</button>
    <div id="result" class="mt-4 font-bold"></div>
    <script>
        const Data = [];
        async function getData() {
            const response = await fetch("https://api.census.gov/data/2020/acs/acs5/profile?get=NAME&for=county:*");
            const rawData = await response.json();
            for (let i = 1; i < rawData.length; i++) {
                const countyObject = {
                    name: rawData[i][0],
                    state: rawData[i][1],
                    county: rawData[i][2]
                };
                Data.push(countyObject);
            }
        }
        getData();

        function getCounty(countyName) {
            for (let i = 0; i < Data.length; i++) {
                if (Data[i].name === countyName) {
                    return Data[i].state + Data[i].county;
                }
            }
            return "Не знайдено";
        }

        const button = document.getElementById("findButton");
        button.onclick = function () {
            const inputField = document.getElementById("countyInput").value;
            const finalCode = getCounty(inputField);
            document.getElementById("result").innerText = "Результат: " + finalCode;
        }
    </script>
</div>
<!-- 4 завдання -->
<div class="mb-10 pb-6 border-b border-gray-300">
    <h3 class="text-xl font-bold mb-4">Завдання 4</h3>
    <form id="userForm">
        <input type="text" id="first_name" placeholder="Ім'я" class="border border-gray-300 p-2 rounded mb-2 w-48">
        <input type="text" id="last_name" placeholder="Прізвище" class="border border-gray-300 p-2 rounded mb-2 w-48">
        <input type="text" id="email" placeholder="Email" class="border border-gray-300 p-2 rounded mb-2 w-48">
        <button type="submit" class="bg-blue-100 hover:bg-blue-200 border border-blue-200 p-2 rounded block mt-2 transition">Перевірити</button>
    </form>
    <div id="errorMessage" class="text-red-500 font-bold mt-3"></div>
    <script>
        const myForm = document.getElementById("userForm");
        myForm.onsubmit = function(event) {
            event.preventDefault();
            const firstName = document.getElementById("first_name").value;
            const lastName = document.getElementById("last_name").value;
            const email = document.getElementById("email").value;
            if (firstName === "" || lastName === "" || email === "") {
                document.getElementById("errorMessage").innerText = "Заповніть усі поля";
            } else {
                document.getElementById("errorMessage").innerText = "";
                alert("\nІм'я: " + firstName + "\nПрізвище: " + lastName + "\nEmail: " + email);
            }
        };
    </script>
</div>
<!-- 5 завдання -->
<div>
    <h3 class="text-xl font-bold mb-4">Завдання 5</h3>
    <button id="buttonLeft" class="bg-gray-200 hover:bg-gray-300 border border-gray-300 p-2 rounded w-20 transition">Вліво</button>
    <button id="buttonRight" class="bg-gray-200 hover:bg-gray-300 border border-gray-300 p-2 rounded w-20 transition">Вправо</button>
    <div id="elid" class="w-24 h-24 bg-pink-400 rounded mt-5 relative left-0" style="transition: left 0.5s ease;"></div>
    <script>
        let position = 0;
        let square = document.getElementById("elid");
        let buttonRight = document.getElementById("buttonRight");
        buttonRight.onclick = function () {
            position = position + 100;
            square.style.left = position + "px";
        };
        let buttonLeft = document.getElementById("buttonLeft");
        buttonLeft.onclick = function () {
            position = position - 100;
            square.style.left = position + "px";
        };
    </script>
</div>
</body>
</html>
